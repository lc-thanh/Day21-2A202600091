# Sieu tham so cho mo hinh RandomForestClassifier
# Thay doi cac gia tri nay giua cac lan chay de thi nghiem (Buoc 1)
n_estimators: 200  # So luong cay quyet dinh trong Random Forest (goi y: 50-100-200)
max_depth: 10  # Do sau toi da cua moi cay quyet dinh (goi y: 3, 5, 10, None)
min_samples_split: 5  # So luong mau toi thieu can thiet de chia node (goi y: 2, 5, 10)
